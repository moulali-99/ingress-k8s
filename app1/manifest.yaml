apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
  replicas: 2
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: frontend
      component: app1
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app1
    spec:
      containers:
      - name: app1
        image: joindevops/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: frontend
    component: app1
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port