apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
  replicas: 2
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: frontend
      component: app1
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app1
    spec:
      containers:
        - name: app1
          image: moulali22/app1:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    tier: frontend
    component: app1
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:568307822298:certificate/250e9587-d660-462f-b0f5-dbd598ad23ff'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: roboshop
spec:
  ingressClassName: alb
  rules:
  - host: "app1.pinjari99.online"  # lisntener rule edi
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80'
